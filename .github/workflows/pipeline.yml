name: Research Radar Pipeline

on:
  schedule:
    - cron: '0 2 * * 1'   # 每周一 UTC 02:00 自动运行
  workflow_dispatch:        # 支持手动触发 / API 触发

permissions:
  contents: write           # 允许 commit 回 papers.json

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run pipeline
        run: cd scripts && python run_pipeline.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: update papers data [skip ci]"
          file_pattern: data/papers.json data/repos.json data/groups.json data/meta.json data/papers-historical.json data/timeline.json
